<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RV Orbit Fitter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💫</text></svg>">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
    <script src="https://raw.githack.com/mzechmeister/csvplotter/master/zoom_pan.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
        input[type=number]{ -moz-appearance:textfield; }
        :root {
            --bg:#f4f6fb; --bg2:#ffffff; --bg3:#e8edf5; --border:#c8d4e8;
            --text:#1a1a2e; --text2:#555; --accent:#1a6fc4; --accent2:#0d4a8a;
            --val:#0a7c3e; --val2:#1a6fc4; --cyan:#0077aa;
            --input-bg:#ffffff;
            --cm-bg:#ffffff; --cm-gutter:#e8edf5; --cm-gutter-fg:#999; --cm-cursor:#333;
            --tab-active:#d0dff5; --tab-inactive:#e8edf5;
            --legend-bg:rgba(255,255,255,0.85);
            --sidebar-w:440px;
            --scrollbar-w:15px;
            --bar-h:38px;
        }
        [data-theme="dark"] {
            --bg:#1a1a2e; --bg2:#16213e; --bg3:#0d1b2a; --border:#0f3460;
            --text:#eee; --text2:#aaa; --accent:#a0c4ff; --accent2:#4cc9f0;
            --val:#a8ff78; --val2:#4cc9f0; --cyan:#a8dadc;
            --input-bg:#1e2d40;
            --cm-bg:#0d1b2a; --cm-gutter:#0a1628; --cm-gutter-fg:#4a6080; --cm-cursor:#ffffff;
            --tab-active:#0a1628; --tab-inactive:#0d1b2a;
            --legend-bg:rgba(13,27,42,0.8);
        }
        body { font-family:Arial,sans-serif; background:var(--bg); color:var(--text); transition:background .3s,color .3s; }

        /* ── fixed project bar ── */
        .project-bar {
            position:fixed; top:0; left:0; right:0; z-index:300;
            display:flex; align-items:center; gap:6px;
            padding:4px 12px; height:var(--bar-h);
            background:var(--bg3); border-bottom:1px solid var(--border);
            font-size:13px; transition:background .3s,border-color .3s;
        }
        .app-title { font-size:15px; font-weight:bold; color:var(--accent); white-space:nowrap; flex:0 0 auto; letter-spacing:.02em; }
        .project-bar label { white-space:nowrap; flex:0 0 auto; color:var(--text2); }
        #projectName { flex:1; min-width:60px; padding:3px 7px; font-size:13px; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:5px; }
        #projectName:focus { outline:none; border-color:var(--accent2); }
        .project-btns { display:flex; gap:5px; align-items:center; flex:0 0 auto; }
        .project-spacer { flex:1; min-width:8px; }
        .theme-btn { background:none; border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:13px; color:var(--text2); cursor:pointer; transition:background .2s; }
        .theme-btn:hover { background:var(--bg2); }

        /* ── sidebar resize handle: replaces left border of sidebar ── */
        #sidebarResizeHandle {
            display:none;
            position:fixed;
            top:var(--bar-h); bottom:0;
            left:calc(100vw - var(--sidebar-w) - 1px);
            width:4px;
            cursor:ew-resize;
            z-index:203;
            background:var(--border);
            transition:background .2s;
        }
        #sidebarResizeHandle:hover,
        #sidebarResizeHandle.dragging { background:var(--accent2); }
        body.sidebar-mode #sidebarResizeHandle { display:block; }
        /* sidebar has no left border — handle acts as the border */
        body.sidebar-mode #paramPanel { border-left:none; }

        /* ── scroll containers ── */
        #leftScroll { padding: calc(var(--bar-h) + 12px) 20px 20px 20px; }
        body.sidebar-mode { overflow:hidden; height:100vh; }
        body.sidebar-mode #leftScroll {
            position:fixed; left:0; top:0; bottom:0; right:var(--sidebar-w);
            overflow-y:auto; padding: calc(var(--bar-h) + 12px) 20px 20px 20px;
        }
        body.sidebar-mode #paramPanel {
            position:fixed; right:0; top:var(--bar-h); bottom:0; width:var(--sidebar-w);
            overflow-y:scroll; border-radius:0;
            box-shadow:-4px 0 24px rgba(0,0,0,.35); z-index:200; margin-bottom:0;
        }

        .container { max-width:1400px; margin:0 auto; }
        .top-row { display:flex; gap:20px; margin-bottom:20px; align-items:flex-start; }
        .panel { background:var(--bg2); border-radius:10px; padding:15px; border:1px solid var(--border); transition:background .3s,border-color .3s; margin-bottom:20px; }
        em { font-style:italic; }
        .panel-header { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
        .panel-header h2 { color:var(--accent); font-size:16px; flex:0 0 auto; margin:0; }
        .collapse-arrow { color:var(--accent); font-size:14px; flex:0 0 auto; transition:transform .2s; }
        .collapse-arrow.open  { transform:rotate(0deg); }
        .collapse-arrow.closed{ transform:rotate(-90deg); }
        .panel-body { margin-top:12px; }
        .panel-body.hidden { display:none; }
        .data-panel { flex:1.4; min-width:0; overflow:hidden; }
        .ds-tabs { display:flex; align-items:flex-end; flex-wrap:wrap; margin-bottom:0; }
        .ds-tab { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:6px 6px 0 0; border:1px solid var(--border); border-bottom:none; background:var(--tab-inactive); color:var(--text2); cursor:pointer; font-size:13px; user-select:none; transition:background .2s,color .2s; margin-right:3px; white-space:nowrap; max-width:180px; }
        .ds-tab.active { background:var(--tab-active); color:var(--accent); font-weight:bold; border-bottom:1px solid var(--tab-active); }
        .ds-tab.drag-over { background:var(--accent2); opacity:.7; }
        .ds-tab .tab-label { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; }
        .ds-tab .tab-rename-input { flex:1; min-width:0; width:80px; font-size:13px; font-weight:inherit; background:var(--input-bg); color:var(--text); border:1px solid var(--accent2); border-radius:3px; padding:0 4px; }
        .ds-tab .tab-rename-input:focus { outline:none; }
        .ds-tab .close-btn { font-size:13px; line-height:1; background:none; border:none; cursor:pointer; color:var(--text2); opacity:.55; padding:0; flex:0 0 auto; transition:opacity .15s; }
        .ds-tab .close-btn:hover { opacity:1; color:#f72585; }
        .ds-tab-add { padding:5px 12px; border-radius:6px 6px 0 0; border:1px solid var(--border); border-bottom:none; background:none; color:var(--accent); cursor:pointer; font-size:17px; font-weight:bold; margin-right:3px; line-height:1; transition:background .2s; }
        .ds-tab-add:hover { background:var(--tab-inactive); }
        .ds-tab-content { border:1px solid var(--border); border-radius:0 6px 6px 6px; background:var(--tab-active); padding:10px; overflow-x:auto; min-width:0; }
        .ds-pane { display:none; }
        .ds-pane.active { display:block; }
        .ds-header { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; padding:6px 8px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; font-size:12px; color:var(--text2); border-left:4px solid transparent; }
        .ds-header label { white-space:nowrap; }
        .ds-header input[type=number] { width:80px; padding:2px 4px; font-size:12px; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:4px; }
        .ds-header input[type=number]:focus { outline:none; border-color:var(--accent2); }
        .ds-header select { padding:2px 4px; font-size:12px; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:4px; }
        .ds-header input[type=range] { width:70px; accent-color:var(--accent2); }
        .data-stats-bar { margin-top:6px; padding:6px 10px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; font-size:12px; display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
        .stat-item { display:flex; gap:5px; }
        .stat-label { color:var(--accent); }
        .stat-val { color:var(--cyan); }
        .view-toggle { display:flex; align-items:center; gap:0; margin-bottom:4px; }
        .view-toggle button { padding:3px 10px; font-size:12px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; font-weight:normal; }
        .view-toggle button:first-child { border-radius:4px 0 0 4px; }
        .view-toggle button:nth-child(2) { border-radius:0 4px 4px 0; border-left:none; }
        .view-toggle button.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }
        .view-toggle label { margin-left:10px; font-size:12px; color:var(--text2); display:inline-flex; align-items:center; gap:4px; cursor:pointer; }
        .ds-preview { font-family:monospace; font-size:12px; background:var(--cm-bg); border:1px solid var(--border); border-radius:6px; padding:4px 0; height:150px; overflow-y:auto; }
        .ds-preview-row { display:flex; align-items:center; padding:1px 6px; }
        .ds-preview-row:hover { background:var(--bg3); }
        .ds-preview-row.clipped { opacity:.35; text-decoration:line-through; }
        .ds-preview-row.comment { color:var(--text2); opacity:.5; }
        .ds-preview-cb { width:13px; height:13px; flex:0 0 auto; margin-right:6px; accent-color:#f72585; cursor:pointer; }
        .ds-preview-time-wrap { display:inline-flex; justify-content:flex-end; margin-right:12px; }
        .ds-preview-time-int { font-family:monospace; white-space:pre; text-align:right; color:var(--text2); }
        .ds-preview-time-dec { font-family:monospace; white-space:pre; text-align:left; color:var(--text2); }
        .CodeMirror { height:150px; font-family:monospace; font-size:13px; line-height:1.5; border:1px solid var(--border); border-radius:6px; background:var(--cm-bg)!important; color:var(--text)!important; min-width:320px; }
        .CodeMirror-gutters { background:var(--cm-gutter)!important; border-right:1px solid var(--border)!important; }
        .CodeMirror-linenumber { color:var(--cm-gutter-fg)!important; font-size:12px; }
        .CodeMirror-cursor { border-left-color:var(--cm-cursor)!important; }
        .CodeMirror textarea { caret-color:var(--cm-cursor)!important; }
        input[type=number],input[type=text],select { background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:5px; }
        input[type=number]:focus,input[type=text]:focus,select:focus { outline:none; border-color:var(--accent2); }
        input[type=checkbox] { accent-color:var(--accent2); width:15px; height:15px; cursor:pointer; }
        select { padding:4px 8px; font-size:13px; }
        .url-input { display:flex; align-items:center; gap:6px; width:100%; margin-top:6px; }
        .url-input input[type=text] { flex:1; padding:4px 6px; font-size:13px; }

        /* ── param panel ── */
        .param-panel { flex:0 0 540px; position:relative; }
        .param-list { display:flex; flex-direction:column; gap:6px; }
        .param-item { display:grid; grid-template-columns:15px 160px 90px 80px auto; align-items:center; gap:6px; }
        .param-item label { font-size:13px; color:var(--text2); text-align:right; }
        .param-item input[type=number] { width:100%; padding:5px 6px; font-size:13px; text-align:right; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:5px; }
        .param-item input[type=number]:focus { outline:none; border-color:var(--accent2); }
        .param-fit-cb { width:15px; height:15px; cursor:pointer; accent-color:var(--accent2); justify-self:center; }
        .param-fit-cb:not(:checked)+label { opacity:.35; }
        .param-sigma { font-size:11px; color:var(--text2); font-family:monospace; white-space:nowrap; }
        .derived-row { display:flex; align-items:center; gap:6px; }
        .derived-row .d-label { flex:0 0 160px; font-size:13px; color:var(--text2); text-align:right; display:inline-block; line-height:1.5; }
        .derived-row .d-val { flex:0 0 130px; min-width:0; font-size:15px; font-weight:bold; color:var(--val); text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .derived-row .d-val.sm { font-size:12px; }
        .planet-derived { display:grid; grid-template-columns:15px 160px auto; align-items:center; gap:6px; opacity:.8; }
        .planet-derived span.d-label { font-size:12px; color:var(--text2); text-align:right; }
        .planet-derived span.d-val { font-size:12px; color:var(--val); font-family:monospace; }
        .section-sep { height:1px; background:var(--border); margin:3px 0; }
        .stats-group { display:flex; flex-direction:column; gap:3px; }
        .stats-group-title { font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:.05em; margin-bottom:2px; opacity:.8; }
        .fit-table { width:100%; border-collapse:collapse; font-size:12px; }
        .fit-table th { text-align:right; padding:2px 6px; color:var(--accent); font-weight:normal; border-bottom:1px solid var(--border); font-size:11px; }
        .fit-table th:first-child { text-align:left; }
        .fit-table td { text-align:right; padding:2px 6px; color:var(--cyan); font-family:monospace; }
        .fit-table td:first-child { text-align:left; color:var(--text2); font-family:Arial,sans-serif; }
        .fit-table tr.total-row td { color:var(--val2); border-top:1px solid var(--border); font-weight:bold; }
        .fit-table tr:hover td { background:var(--bg2); }

        /* ── planet tab bar ── */
        .planet-tab-bar { display:flex; align-items:flex-end; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:thin; margin-bottom:0; }
        .planet-tab-bar::-webkit-scrollbar { height:3px; }
        .planet-tab-bar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
        .planet-tab { display:flex; align-items:center; gap:4px; padding:4px 10px; border-radius:6px 6px 0 0; border:1px solid var(--border); border-bottom:none; background:var(--tab-inactive); color:var(--text2); cursor:pointer; font-size:12px; user-select:none; transition:background .15s,color .15s; margin-right:3px; white-space:nowrap; flex-shrink:0; }
        .planet-tab.active { background:var(--bg3); font-weight:bold; border-bottom:1px solid var(--bg3); }
        #ptab_all { position:sticky; left:0; background:var(--bg2); z-index:2; }
        #ptab_all.active { background:var(--bg3); }
        .planet-tab-add { padding:4px 10px; border-radius:6px 6px 0 0; border:1px solid var(--border); border-bottom:none; background:var(--bg2); color:var(--accent); cursor:pointer; font-size:16px; line-height:1; transition:background .15s; flex-shrink:0; position:sticky; right:0; z-index:2; }
        .planet-tab-add:hover { background:var(--bg3); }
        .planet-tab-content { border:1px solid var(--border); border-radius:0 6px 6px 6px; background:var(--bg3); padding:8px; }
        .planet-block { display:none; margin-bottom:6px; }
        .planet-block.active { display:block; }
        .planet-block.inactive { opacity:.45; }
        .planet-header { display:flex; align-items:center; gap:6px; user-select:none; margin-bottom:8px; }
        .planet-name-input { font-size:13px; font-weight:bold; background:none; border:none; border-bottom:1px solid transparent; color:inherit; width:100px; cursor:text; outline:none; padding:0; }
        .planet-name-input:focus { border-bottom-color:var(--accent2); background:var(--input-bg); }
        .planet-body { display:flex; flex-direction:column; gap:6px; }
        .planet-ctrl { background:none; border:none; cursor:pointer; color:var(--text2); opacity:.6; font-size:14px; padding:0 2px; flex:0 0 auto; transition:opacity .15s; }
        .planet-ctrl:hover { opacity:1; }
        .planet-ctrl.del:hover { color:#f72585; }
        .gamma-row { display:grid; grid-template-columns:15px 160px 90px 80px auto; align-items:center; gap:6px; border-left:3px solid transparent; padding-left:5px; }
        .gamma-row label { font-size:13px; color:var(--text2); text-align:right; }
        .gamma-row input[type=number] { width:100%; padding:5px 6px; font-size:13px; text-align:right; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:5px; }
        .gamma-row input[type=number]:focus { outline:none; border-color:var(--accent2); }
        .gamma-sigma { font-size:11px; color:var(--text2); font-family:monospace; }
        .bjd0-row,.starmass-row,.gamma-ref-row { display:grid; align-items:center; gap:6px; padding:4px 0; }
        .bjd0-row { grid-template-columns:160px 90px auto auto; }
        .starmass-row { grid-template-columns:160px 90px 16px 70px auto auto; }
        .gamma-ref-row { grid-template-columns:160px 90px auto auto; border:1px solid var(--border); border-radius:6px; padding:6px 8px; background:transparent; }
        .bjd0-row>.param-label,.starmass-row>label,.gamma-ref-row>.param-label { font-size:13px; color:var(--text2); text-align:right; }
        .bjd0-row input[type=number],.starmass-row input[type=number],.gamma-ref-row input[type=number] { width:100%; padding:5px 6px; font-size:13px; text-align:right; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:5px; }
        .bjd0-row input[type=number]:focus,.starmass-row input[type=number]:focus,.gamma-ref-row input[type=number]:focus { outline:none; border-color:var(--accent2); }
        .unit-lbl { font-size:12px; color:var(--text2); white-space:nowrap; text-align:right; }
        .starmass-row select,.gamma-ref-row select { font-size:12px; padding:2px 4px; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:4px; }
        .param-label { font-size:13px; color:var(--text2); text-align:right; display:inline-block; line-height:1.5; }
        .fit-algo-row { display:flex; align-items:center; gap:8px; }
        .fit-algo-row label { flex:0 0 160px; font-size:13px; color:var(--text2); text-align:right; }
        .fit-algo-row select { flex:0 0 130px; }
        .btn-row { display:flex; gap:8px; margin-top:10px; align-items:center; flex-wrap:wrap; }
        .btn-row-spacer { flex:1; }
        button { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:bold; transition:background .2s,filter .2s; }
        button:not(.theme-btn):not(.view-toggle button):hover { filter:brightness(.88); }
        .btn-fit { background:#4cc9f0; color:#000; }
        .btn-fit-top { background:#4cc9f0; color:#000; padding:3px 10px; font-size:12px; font-weight:bold; border:none; border-radius:5px; cursor:pointer; transition:background .2s,filter .2s; flex:0 0 auto; min-width:64px; text-align:center; }
        .btn-fit-top:hover { filter:brightness(.88); }
        @keyframes fitbtn { 0%{content:'⏳';} 50%,100%{content:'⌛';} }
        .btn-fit:disabled,.btn-fit-top:disabled { opacity:1; filter:none; cursor:wait; }
        .btn-fit:disabled span,.btn-fit-top:disabled span { display:none; }
        .btn-fit:disabled::before { content:'⏳ Fitting…'; animation:fitbtn 1s step-start infinite; }
        .btn-fit-top:disabled::before { content:'⏳ Fitting…'; animation:fitbtn 1s step-start infinite; }
        .btn-undo { background:#888; color:#fff; padding:8px 12px; }
        .btn-undo:disabled { opacity:.35; cursor:not-allowed; filter:none; }
        .btn-new    { background:#e9c46a; color:#000; }
        .btn-sample { background:#7209b7; color:#fff; }
        .btn-auto   { background:#3a86ff; color:#fff; }
        .btn-load   { background:#06d6a0; color:#000; }
        .btn-url    { background:#fb8500; color:#000; }
        .btn-save   { background:#6a4c93; color:#fff; padding:6px 12px; font-size:12px; }
        .btn-saveas { background:#4a3570; color:#fff; padding:6px 12px; font-size:12px; }
        .btn-open   { background:#2d6a4f; color:#fff; padding:6px 12px; font-size:12px; }
        .btn-gls-run{ background:#e63946; color:#fff; padding:6px 14px; font-size:12px; }
        .btn-view   { background:none; border:1px solid var(--border); border-radius:5px; padding:4px 8px; font-size:12px; color:var(--text2); cursor:pointer; }
        .btn-view:hover { background:var(--bg3); }
        .btn-view.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }
        /* add-panel buttons row */
        .add-panel-row { display:flex; gap:8px; margin-bottom:20px; }
        .btn-add-panel { background:none; border:1px dashed var(--border); border-radius:6px; color:var(--accent2); cursor:pointer; font-size:13px; padding:6px 14px; transition:background .2s; flex:1; }
        .btn-add-panel:hover { background:var(--bg3); }
        .sidebar-close { position:absolute; top:8px; right:8px; background:none; border:1px solid var(--border); border-radius:5px; padding:2px 8px; font-size:12px; color:var(--text2); cursor:pointer; z-index:10; }
        .sidebar-close:hover { background:var(--bg3); }
        body:not(.sidebar-mode) .sidebar-close { display:none; }

        /* ── planet table ── */
        #planetTableWrap { overflow-x:auto; }
        .planet-table { display:grid; grid-template-columns:130px repeat(var(--n-planets,1), minmax(110px,1fr)); gap:2px 3px; align-items:start; font-size:12px; min-width:0; }
        .pt-corner {}
        .pt-head { display:flex; align-items:center; justify-content:space-between; padding:3px 4px; font-weight:bold; color:var(--accent); border-bottom:2px solid var(--border); gap:3px; }
        .pt-head input.planet-name-input { font-size:12px; width:65px; }
        .pt-label { font-size:11px; color:var(--text2); text-align:right; padding:2px 4px 2px 0; white-space:nowrap; border-right:1px solid var(--border); align-self:center; }
        .pt-label.sep { border-top:1px solid var(--border); padding-top:5px; margin-top:3px; }
        .pt-cell { padding:1px 2px; display:flex; flex-direction:column; gap:1px; }
        .pt-cell-top { display:flex; align-items:center; gap:3px; }
        .pt-cell-top input[type=checkbox] { width:12px; height:12px; flex:0 0 auto; accent-color:var(--accent2); cursor:pointer; margin:0; }
        .pt-cell input[type=number] { flex:1; min-width:0; padding:2px 3px; font-size:12px; text-align:right; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:3px; }
        .pt-cell input[type=number]:focus { outline:none; border-color:var(--accent2); }
        .pt-cell .param-sigma { font-size:10px; color:var(--text2); text-align:right; min-height:12px; padding-left:16px; }
        .pt-derived { font-size:11px; color:var(--val); font-family:monospace; padding:1px 3px; align-self:center; }
        .planet-view-bar { display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:12px; }
        #planetTabView, #planetTableView { min-height:120px; }
        .inset-box { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:6px 8px; }

        /* ── generic panel slot (plot or gls) ── */
        .panel-slot { padding:10px; }
        .panel-slot-header {
            display:flex; align-items:center; gap:8px;
            user-select:none; margin-bottom:0; cursor:grab;
        }
        .panel-slot-header:active { cursor:grabbing; }
        .panel-slot-header h2 { color:var(--accent); font-size:16px; flex:0 0 auto; margin:0; pointer-events:none; }
        .panel-slot-title { display:flex; align-items:center; gap:8px; flex:1; pointer-events:none; }
        .panel-slot-close { background:none; border:none; cursor:pointer; color:var(--text2); opacity:.6; font-size:16px; padding:0 4px; line-height:1; transition:opacity .15s; flex:0 0 auto; pointer-events:all; }
        .panel-slot-close:hover { opacity:1; color:#f72585; filter:none; }
        .panel-slot.drag-over { border-top:3px solid var(--accent2); }
        /* plot options */
        .plot-options { display:flex; gap:10px; align-items:center; padding:6px 0 8px 0; flex-wrap:wrap; }
        .plot-options label { font-size:13px; color:var(--text2); white-space:nowrap; }
        .check-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text2); cursor:pointer; }
        .plot-rv  { width:100%; height:340px; }
        .plot-res { width:100%; height:160px; }
        .plot-divider { height:1px; background:var(--border); margin:3px 0; }
        /* gls slot options */
        .gls-slot-options { display:flex; gap:10px; align-items:center; padding:6px 0 8px 0; flex-wrap:wrap; }
        .gls-slot-options label { font-size:13px; color:var(--text2); white-space:nowrap; }
        .gls-slot-options input[type=number] { width:80px; padding:3px 6px; font-size:13px; }
        .gls-subtract-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-size:13px; color:var(--text2); margin-bottom:8px; min-height:24px; }
        .gls-planet-cb { display:inline-flex; align-items:center; gap:4px; cursor:pointer; padding:2px 6px; border-radius:4px; border:1px solid transparent; transition:background .15s; }
        .gls-planet-cb:hover { background:var(--bg3); }
        .gls-planet-cb input { accent-color:var(--accent2); width:13px; height:13px; }
        .gls-planet-cb span { font-size:12px; }
        .gls-plot-wrapper { position:relative; width:100%; }
        .gls-peak-info { font-size:12px; color:var(--cyan); margin-top:6px; min-height:18px; }

        #statusMsg { margin-top:10px; padding:8px 12px; border-radius:6px; font-size:13px; display:none; }
        .msg-ok  { background:#1b4332; color:#52b788; display:block!important; }
        .msg-err { background:#6b1a1a; color:#ff6b6b; display:block!important; }
        .global-unit-sel { font-size:12px; padding:2px 6px; border-radius:4px; background:var(--input-bg); color:var(--accent); border:1px solid var(--border); cursor:pointer; }
        .global-unit-sel:focus { outline:none; border-color:var(--accent2); }
    </style>
</head>

<script>
'use strict';
// ── Constants ─────────────────────────────────────────────────────────────────
const MSUN=1.989e30,MJUP=1.898e27,MEAR=5.972e24,AU=1.496e11,G=6.674e-11,DAY=86400;
const PALETTE       =['#4cc9f0','#ff9f1c','#a0ff78','#f72585','#b5838d','#80ffdb'];
const SYMBOLS       =['circle','square','diamond','triangle-up','triangle-down','cross','x','star'];
const PLANET_COLORS =['#f72585','#a0ff78','#ffbe0b','#80ffdb','#b5838d','#ff9f1c'];
const PLANET_LETTERS='bcdefghijklmnopqrstuvwxyz';

// ── State ─────────────────────────────────────────────────────────────────────
let planets=[],nextPlanetId=1,activePlanetPid=null;
let datasets=[],activeId=null,nextId=1,lastSavedFilename=null;
let rvModelCallCount=0,undoSnapshot=null;
let _lastSigmasFull=null;
let dragDsPid=null;
const glsLineStates={};   // sid → {pid → {active}}
let glsDragStates={};     // sid → drag state
let _planetView='table';

// ── Panel slots (unified: type 'plot' or 'gls') ────────────────────────────────
let panels=[],nextPanelId=1;
let _dragPanelSid=null;

// ── DOM helpers ───────────────────────────────────────────────────────────────
const el        =id=>document.getElementById(id);
const getNumVal =(id,fb=0)=>parseFloat(el(id)?.value)||fb;
const getChecked=(id,fb=true)=>el(id)?el(id).checked:fb;
function setNumVal(id,v,d=4){ const e=el(id); if(e) e.value=isFinite(v)?v.toFixed(d):''; }
function makeEl(tag,props={},children=[]){
    const e=document.createElement(tag);
    Object.entries(props).forEach(([k,v])=>{
        if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
        else if(k==='class') e.className=v;
        else if(k==='text')  e.textContent=v;
        else if(k==='html')  e.innerHTML=v;
        else e[k]=v;
    });
    children.forEach(c=>c&&e.appendChild(c));
    return e;
}

// ── Math helpers ──────────────────────────────────────────────────────────────
function mean(arr){ if(!arr.length) return 0; return arr.reduce((a,b)=>a+b,0)/arr.length; }
function std(arr){ if(!arr.length) return 0; const m=mean(arr); return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length); }
function median(arr){ if(!arr.length) return NaN; const s=[...arr].sort((a,b)=>a-b),m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; }

// ── Number formatting ─────────────────────────────────────────────────────────
function sigDec(v){ if(!isFinite(v)||v===0) return 2; return Math.max(0,2-Math.floor(Math.log10(Math.abs(v)))); }
function fmtSig3(v){ if(!isFinite(v)) return '—'; return v.toFixed(sigDec(v)); }
function fmtRVPair(rv,err){
    const dec=isFinite(err)&&err>0?sigDec(err):sigDec(rv);
    return{rvStr:isFinite(rv)?rv.toFixed(dec):'—',errStr:isFinite(err)&&err>0?err.toFixed(dec):''};
}

// ── Unit helpers ──────────────────────────────────────────────────────────────
const toMs  =(v,u)=>u==='km/s'?v*1e3:v;
const fromMs=(v,u)=>u==='km/s'?v/1e3:v;
function getKUnit(){ return el('globalUnit')?.value||'m/s'; }
function getDsUnit(ds){ return el(`rvUnit_${ds.id}`)?.value||ds.rvUnit||'m/s'; }

// ── JD → ISO ─────────────────────────────────────────────────────────────────
function jdToIso(jd){ if(!isFinite(jd)||jd<1) return '—'; return new Date((jd-2440587.5)*86400000).toISOString().slice(0,19).replace('T',' '); }

// ── t_ω label ─────────────────────────────────────────────────────────────────
function tOmegaLabel(){ const b=getGlobalBJD0()?'− BJD0 ':''; return `<em>t</em><sub><em>ω</em></sub> ${b}[days]`; }
function updateT0Labels(){ planets.forEach(pl=>{ const inp=el(`pT0_${pl.pid}`); if(!inp) return; const lbl=inp.closest('.param-item')?.querySelector('label'); if(lbl) lbl.innerHTML=tOmegaLabel(); }); }

// ── x-axis label ──────────────────────────────────────────────────────────────
function xAxisLabel(slot){
    const bjd0=getGlobalBJD0();
    if(slot.foldPid!==null){ const pl=planets.find(p=>p.pid===slot.foldPid); return `Phase [days]  (${pl?.name||''})`; }
    if(slot.showAsDate) return 'Date (UTC)';
    if(bjd0) return `BJD − ${bjd0} [days]`;
    return 'Time [days]';
}

// ── Plot base ─────────────────────────────────────────────────────────────────
function makePlotBase(){
    const C=plotColours(),fontCol=isDark()?'#eee':'#1a1a2e';
    const minor={ticks:'inside',ticklen:3,tickcolor:C.grid};
    const axBase={gridcolor:C.grid,zerolinecolor:C.zero,exponentformat:'none',color:fontCol,ticks:'inside',mirror:'ticks',minor};
    const base={paper_bgcolor:C.paper,plot_bgcolor:C.bg,font:{color:fontCol,size:13}};
    return{C,fontCol,axBase,base};
}

// ── Planet helpers ────────────────────────────────────────────────────────────
function defaultPlanetName(i){ return 'Planet '+(PLANET_LETTERS[i]||String.fromCharCode(98+i)); }
function planetColor(i){ return PLANET_COLORS[i%PLANET_COLORS.length]; }
function planetIndex(pid){ return planets.findIndex(p=>p.pid===pid); }

// ── Scrollbar + sidebar ───────────────────────────────────────────────────────
function updateScrollbarWidth(){ const w=window.innerWidth-document.documentElement.clientWidth; document.documentElement.style.setProperty('--scrollbar-w',(w||15)+'px'); }
function getSidebarWidth(){ return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'))||440; }

function initSidebarResize(){
    const handle=el('sidebarResizeHandle');
    let startX,startW;
    function onDrag(e){
        const newW=Math.max(280,Math.min(780,startW+(startX-e.clientX)));
        document.documentElement.style.setProperty('--sidebar-w',newW+'px');
        clearTimeout(onDrag._t);
        onDrag._t=setTimeout(()=>resizeAllPlots(),80);
    }
    function onDragEnd(){
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove',onDrag);
        document.removeEventListener('mouseup',onDragEnd);
        resizeAllPlots();
    }
    handle.addEventListener('mousedown',e=>{
        if(!document.body.classList.contains('sidebar-mode')) return;
        e.preventDefault(); startX=e.clientX; startW=getSidebarWidth();
        handle.classList.add('dragging');
        document.addEventListener('mousemove',onDrag);
        document.addEventListener('mouseup',onDragEnd);
    });
    handle.addEventListener('touchstart',e=>{ const t=e.touches[0]; startX=t.clientX; startW=getSidebarWidth(); },{passive:true});
    handle.addEventListener('touchmove',e=>{ const t=e.touches[0]; const nw=Math.max(280,Math.min(780,startW+(startX-t.clientX))); document.documentElement.style.setProperty('--sidebar-w',nw+'px'); },{passive:true});
}
function resizeAllPlots(){
    panels.forEach(p=>{
        if(p.type==='plot'){ Plotly.Plots.resize(`plotRV_${p.sid}`); if(p.showRes) Plotly.Plots.resize(`plotRes_${p.sid}`); }
        else if(p.type==='gls'){ Plotly.Plots.resize(`plotGLS_${p.sid}`); }
    });
    panels.filter(p=>p.type==='gls').forEach(p=>buildGLSOverlay(p.sid));
}

// ── Read/write planet DOM ─────────────────────────────────────────────────────
function readPlanetDOM(pl){
    const KU=getKUnit();
    pl.name=el(`pName_${pl.pid}`)?.value||pl.name;
    pl.P=getNumVal(`pP_${pl.pid}`,10); pl.K_ms=toMs(getNumVal(`pK_${pl.pid}`),KU);
    pl.e=getNumVal(`pE_${pl.pid}`); pl.omega_deg=getNumVal(`pOmega_${pl.pid}`);
    pl.t0=getNumVal(`pT0_${pl.pid}`);
    ['fitP','fitK','fitE','fitOmega','fitT0'].forEach(k=>pl[k]=getChecked(`${k}_${pl.pid}`));
    pl.active=getChecked(`pActive_${pl.pid}`);
}
function readAllPlanetDOM(){ planets.forEach(readPlanetDOM); }
function writePlanetDOM(pl){
    if(!pl?.pid) return;
    const KU=getKUnit();
    const nameEl=el(`pName_${pl.pid}`); if(nameEl) nameEl.value=pl.name;
    setNumVal(`pP_${pl.pid}`,pl.P,6); setNumVal(`pK_${pl.pid}`,fromMs(pl.K_ms||0,KU),4);
    setNumVal(`pE_${pl.pid}`,pl.e,6); setNumVal(`pOmega_${pl.pid}`,pl.omega_deg,2);
    setNumVal(`pT0_${pl.pid}`,pl.t0,4);
    const map={fitP:'fitP',fitK:'fitK',fitE:'fitE',fitOmega:'fitOmega',fitT0:'fitT0',active:'pActive'};
    Object.entries(map).forEach(([key,pfx])=>{ const cb=el(`${pfx}_${pl.pid}`); if(cb&&pl[key]!=null) cb.checked=pl[key]; });
}

// ── Project ───────────────────────────────────────────────────────────────────
function getProjectName(){ return el('projectName').value.trim()||'untitled'; }
function updateWindowTitle(){ document.title=`${getProjectName()} – RV Fitter`; }

// ── Session ───────────────────────────────────────────────────────────────────
function saveToSession(){ try{ sessionStorage.setItem('rvfitter_project',JSON.stringify(buildProjectJSON())); }catch(e){} }
function restoreFromSession(){ const raw=sessionStorage.getItem('rvfitter_project'); if(!raw) return false; try{ const proj=JSON.parse(raw); if(!proj.datasets) return false; loadProjectFromObj(proj); return true; }catch(e){ return false; } }

// ── BJD0 ─────────────────────────────────────────────────────────────────────
function getGlobalBJD0(){ return getNumVal('globalBJD0'); }
function getDsT0Ref(ds){ return getNumVal(`t0ref_${ds.id}`); }

// ── Fold selects ──────────────────────────────────────────────────────────────
function rebuildFoldSelects(){
    panels.filter(p=>p.type==='plot').forEach(slot=>{
        const sel=el(`foldSelect_${slot.sid}`); if(!sel) return;
        const prev=String(slot.foldPid??'none');
        sel.innerHTML='<option value="none">Time series</option>';
        planets.filter(pl=>pl.active!==false).forEach(pl=>sel.appendChild(makeEl('option',{value:String(pl.pid),text:pl.name})));
        const valid=[...sel.options].map(o=>o.value);
        sel.value=valid.includes(prev)?prev:'none';
        slot.foldPid=sel.value==='none'?null:parseInt(sel.value);
    });
}

// ── GLS subtract rows ─────────────────────────────────────────────────────────
function rebuildGLSSubtractRows(){
    panels.filter(p=>p.type==='gls').forEach(slot=>{
        const row=el(`glsSubRow_${slot.sid}`); if(!row) return;
        row.innerHTML='';
        const active=planets.filter(pl=>pl.active!==false);
        if(!active.length){ row.style.display='none'; return; }
        row.style.display='flex';
        row.appendChild(makeEl('span',{html:'<em>RV</em>'}));
        active.forEach(pl=>{
            const col=planetColor(planetIndex(pl.pid));
            row.appendChild(makeEl('span',{text:' − ',style:{color:'var(--text2)',opacity:'.5'}}));
            const cb=makeEl('input',{type:'checkbox',id:`glsSub_${slot.sid}_${pl.pid}`});
            if(!slot.glsSubtract) slot.glsSubtract={};
            cb.checked=slot.glsSubtract[pl.pid]!==false;
            cb.addEventListener('change',()=>{ slot.glsSubtract[pl.pid]=cb.checked; updateGLSSlot(slot.sid); });
            row.appendChild(makeEl('label',{class:'gls-planet-cb',style:{borderColor:col+'55'}},[cb,makeEl('span',{text:pl.name,style:{color:col}})]));
        });
    });
}

// ── GLS overlay per slot ──────────────────────────────────────────────────────
function glsLayoutOf(sid){ return el(`plotGLS_${sid}`)?._fullLayout||null; }
function periodToPixelX(sid,P){
    const L=glsLayoutOf(sid); if(!L) return null;
    const slot=panels.find(p=>p.sid===sid&&p.type==='gls'); if(!slot) return null;
    const xa=L.xaxis,xMode=slot.xAxis||'logperiod';
    try{ const dataVal=xMode==='freq'?1/P:P; const axVal=xa.type==='log'?Math.log10(dataVal):dataVal; return xa.l2p(axVal)+xa._offset; }catch(e){ return null; }
}
function pixelXToPeriod(sid,px){
    const L=glsLayoutOf(sid); if(!L) return null;
    const slot=panels.find(p=>p.sid===sid&&p.type==='gls'); if(!slot) return null;
    const xa=L.xaxis,xMode=slot.xAxis||'logperiod';
    try{ const axVal=xa.p2l(px-xa._offset); const dataVal=xa.type==='log'?Math.pow(10,axVal):axVal; return xMode==='freq'?1/dataVal:dataVal; }catch(e){ return null; }
}
function glsYTop(sid){ return glsLayoutOf(sid)?.yaxis._offset||0; }
function glsYH(sid)  { return glsLayoutOf(sid)?.yaxis._length||280; }

function buildGLSOverlayWhenReady(sid,attempts=0){
    const L=glsLayoutOf(sid);
    if((!L||!L.xaxis._offset)&&attempts<20){ setTimeout(()=>buildGLSOverlayWhenReady(sid,attempts+1),30); return; }
    buildGLSOverlay(sid);
}
function buildGLSOverlay(sid){
    const svg=el(`glsOverlay_${sid}`); if(!svg) return;
    svg.innerHTML='';
    const slot=panels.find(p=>p.sid===sid&&p.type==='gls'); if(!slot) return;
    if(!slot.showPeriod){ svg.style.display='none'; return; }
    svg.style.display='';
    const L=glsLayoutOf(sid); if(!L) return;
    const pMin=slot.pMin||1,pMax=slot.pMax||1000;
    const yTop=glsYTop(sid),yH=glsYH(sid);
    if(!glsLineStates[sid]) glsLineStates[sid]={};
    planets.filter(pl=>pl.active!==false).forEach(pl=>{
        const fitP=getNumVal(`pP_${pl.pid}`); if(fitP<pMin||fitP>pMax) return;
        const col=planetColor(planetIndex(pl.pid));
        if(!glsLineStates[sid][pl.pid]) glsLineStates[sid][pl.pid]={active:false};
        const state=glsLineStates[sid][pl.pid];
        const px=periodToPixelX(sid,fitP); if(px===null||!isFinite(px)) return;
        function svgLine(id,stroke,sw,dash){
            const l=document.createElementNS('http://www.w3.org/2000/svg','line');
            if(id) l.id=id; l.setAttribute('x1',px); l.setAttribute('x2',px);
            l.setAttribute('y1',yTop); l.setAttribute('y2',yTop+yH);
            l.setAttribute('stroke',stroke); l.setAttribute('stroke-width',sw);
            if(dash) l.setAttribute('stroke-dasharray',dash); return l;
        }
        const vis=svgLine(`glsVis_${sid}_${pl.pid}`,col,state.active?'2.5':'1.5',state.active?null:'6,4');
        vis.setAttribute('opacity',state.active?'1':'0.75'); vis.style.pointerEvents='none';
        svg.appendChild(vis);
        const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
        txt.setAttribute('x',px+4); txt.setAttribute('y',yTop+14);
        txt.setAttribute('fill',col); txt.setAttribute('font-size','11'); txt.setAttribute('font-family','Arial,sans-serif');
        txt.style.pointerEvents='none'; txt.textContent=pl.name; svg.appendChild(txt);
        const hit=svgLine(`glsHit_${sid}_${pl.pid}`,'transparent','14');
        hit.style.pointerEvents='stroke'; hit.style.cursor='ew-resize';
        const ttl=document.createElementNS('http://www.w3.org/2000/svg','title');
        ttl.textContent=`${pl.name}:  P = ${fitP.toFixed(4)} d\nDrag to adjust · Click to activate`;
        hit.appendChild(ttl);
        hit.addEventListener('mousedown',e=>{ e.preventDefault(); e.stopPropagation(); _glsStartDrag(sid,pl.pid,e.clientX); });
        hit.addEventListener('click',e=>{
            e.stopPropagation();
            if(glsDragStates[sid]?.didMove) return;
            state.active=!state.active;
            if(state.active){ Object.values(glsLineStates[sid]).forEach(s=>{ if(s!==state) s.active=false; }); showMsg(`Click GLS curve to set period for ${pl.name}`,true); }
            buildGLSOverlay(sid);
        });
        svg.appendChild(hit);
    });
    svg.style.pointerEvents='none';
}

// ── GLS drag per slot ─────────────────────────────────────────────────────────
function _glsStartDrag(sid,pid,clientX){
    glsDragStates[sid]={pid,startClientX:clientX,currentPeriod:null,didMove:false};
    el(`glsOverlay_${sid}`).style.pointerEvents='all';
    if(!glsLineStates[sid]) glsLineStates[sid]={};
    if(!glsLineStates[sid][pid]) glsLineStates[sid][pid]={active:false};
    glsLineStates[sid][pid].active=true;
    Object.entries(glsLineStates[sid]).forEach(([p,s])=>{ if(parseInt(p)!==pid) s.active=false; });
    buildGLSOverlay(sid);
    const mm=e=>_glsOnDragMove(sid,e),mu=()=>_glsOnDragEnd(sid);
    glsDragStates[sid]._mm=mm; glsDragStates[sid]._mu=mu;
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
}
function _glsOnDragMove(sid,e){
    const ds=glsDragStates[sid]; if(!ds) return;
    const rect=el(`glsOverlay_${sid}`).getBoundingClientRect();
    const period=pixelXToPeriod(sid,e.clientX-rect.left);
    if(!period||period<=0) return;
    ds.didMove=true; ds.currentPeriod=period;
    const px=periodToPixelX(sid,period); if(px===null||!isFinite(px)) return;
    [`glsVis_${sid}_${ds.pid}`,`glsHit_${sid}_${ds.pid}`].forEach(id=>{ const l=el(id); if(l){ l.setAttribute('x1',px); l.setAttribute('x2',px); } });
    setNumVal(`pP_${ds.pid}`,period,6);
}
function _glsOnDragEnd(sid){
    const ds=glsDragStates[sid]; if(!ds) return;
    document.removeEventListener('mousemove',ds._mm);
    document.removeEventListener('mouseup',ds._mu);
    if(ds.didMove&&ds.currentPeriod){ setNumVal(`pP_${ds.pid}`,ds.currentPeriod,6); if(glsLineStates[sid]?.[ds.pid]) glsLineStates[sid][ds.pid].active=false; updateAllPanels(); buildGLSOverlay(sid); }
    delete glsDragStates[sid];
    el(`glsOverlay_${sid}`).style.pointerEvents='none';
}
function _glsHandleCurveClick(sid,period){
    const states=glsLineStates[sid]||{};
    const activePid=Object.entries(states).find(([,s])=>s.active)?.[0];
    if(!activePid) return false;
    const pl=planets.find(p=>p.pid===parseInt(activePid)); if(!pl) return false;
    setNumVal(`pP_${pl.pid}`,period,6); states[activePid].active=false;
    showMsg(`Period of ${pl.name} set to ${period.toFixed(4)} d`,true);
    updateAllPanels(); buildGLSOverlay(sid); return true;
}

// ── Default opts ──────────────────────────────────────────────────────────────
function defaultPlotOpts(opts={}){
    return{foldPid:opts.foldPid??null,showRes:opts.showRes??true,colorByTime:opts.colorByTime??false,showAsDate:opts.showAsDate??false,showClipped:opts.showClipped??true,clippedStyle:opts.clippedStyle??'x'};
}
function defaultGLSOpts(opts={}){
    // copy from last GLS panel if exists
    const last=panels.filter(p=>p.type==='gls').at(-1);
    return{
        pMin:     opts.pMin     ?? last?.pMin     ?? 1,
        pMax:     opts.pMax     ?? last?.pMax     ?? 1000,
        ofac:     opts.ofac     ?? last?.ofac     ?? 10,
        xAxis:    opts.xAxis    ?? last?.xAxis    ?? 'logperiod',
        showPeriod:opts.showPeriod ?? last?.showPeriod ?? true,
        useExt:   opts.useExt   ?? last?.useExt   ?? false,
        glsSubtract: opts.glsSubtract ?? {},
        _afterplotBound: false,
    };
}

// ── Add panel ─────────────────────────────────────────────────────────────────
function addPanel(type,opts={}){
    const sid=nextPanelId++;
    const slot=type==='plot'
        ? {type:'plot',sid,...defaultPlotOpts(opts)}
        : {type:'gls', sid,...defaultGLSOpts(opts)};
    panels.push(slot);
    _buildPanelDOM(slot);
    if(type==='plot'){ rebuildFoldSelects(); updatePlotSlot(sid); }
    else{ rebuildGLSSubtractRows(); updateGLSSlot(sid); }
    return slot;
}

// ── Build panel DOM ───────────────────────────────────────────────────────────
function _buildPanelDOM(slot){
    const sid=slot.sid,type=slot.type;
    const isFirst=panels.indexOf(slot)===0;
    const panel=makeEl('div',{class:'panel panel-slot',id:`panelSlot_${sid}`});

    // header (draggable)
    const arrowSpan=makeEl('span',{class:'collapse-arrow open',id:`slotArrow_${sid}`,text:'▼',style:{pointerEvents:'none'}});
    const titleSpan=makeEl('span',{class:'panel-slot-title'});
    titleSpan.appendChild(arrowSpan);
    const icon=type==='plot'?'📈':'🔭';
    const label=type==='plot'?`Plot ${sid}`:`GLS ${sid}`;
    titleSpan.appendChild(makeEl('h2',{text:`${icon} ${label}`}));
    const closeBtn=(!isFirst||panels.length>1)?makeEl('button',{class:'panel-slot-close',title:'Remove',html:'×'}):null;
    if(closeBtn) closeBtn.addEventListener('click',e=>{ e.stopPropagation(); removePanel(sid); });
    const header=makeEl('div',{class:'panel-slot-header',id:`slotHeader_${sid}`,draggable:true});
    header.appendChild(titleSpan);
    if(closeBtn) header.appendChild(closeBtn);

    // drag logic — fix race condition with setTimeout
    let _dragging=false;
    header.addEventListener('dragstart',e=>{ _dragging=true; _dragPanelSid=sid; e.dataTransfer.effectAllowed='move'; panel.style.opacity='.5'; });
    header.addEventListener('dragend',()=>{
        _dragging=false; panel.style.opacity='';
        document.querySelectorAll('.panel-slot.drag-over').forEach(p=>p.classList.remove('drag-over'));
        // delay clearing sid so drop fires first
        setTimeout(()=>{ _dragPanelSid=null; },0);
    });
    header.addEventListener('click',()=>{ if(!_dragging) togglePanelSlot(sid); });
    panel.addEventListener('dragover',e=>{ e.preventDefault(); if(_dragPanelSid&&_dragPanelSid!==sid) panel.classList.add('drag-over'); });
    panel.addEventListener('dragleave',()=>panel.classList.remove('drag-over'));
    panel.addEventListener('drop',e=>{ e.preventDefault(); panel.classList.remove('drag-over'); if(_dragPanelSid&&_dragPanelSid!==sid) swapPanels(_dragPanelSid,sid); });

    panel.appendChild(header);
    const body=makeEl('div',{class:'panel-body',id:`slotBody_${sid}`});

    if(type==='plot') _buildPlotBody(slot,body);
    else              _buildGLSBody(slot,body);

    panel.appendChild(body);
    el('panelSlotsContainer').appendChild(panel);
}

function _buildPlotBody(slot,body){
    const sid=slot.sid;
    const optRow=makeEl('div',{class:'plot-options'});
    const foldSel=makeEl('select',{id:`foldSelect_${sid}`,style:{fontSize:'13px',padding:'3px 6px'}});
    foldSel.innerHTML='<option value="none">Time series</option>';
    foldSel.addEventListener('change',()=>{ slot.foldPid=foldSel.value==='none'?null:parseInt(foldSel.value); updatePlotSlot(sid); });
    optRow.appendChild(makeEl('label',{text:'Phase-fold:',style:{fontSize:'13px',color:'var(--text2)'}}));
    optRow.appendChild(foldSel);
    function mkCb(lbl,val,fn){ const l=makeEl('label',{class:'check-item'}); const cb=makeEl('input',{type:'checkbox'}); cb.checked=val; cb.addEventListener('change',()=>{ fn(cb.checked); updatePlotSlot(sid); }); l.appendChild(cb); l.appendChild(makeEl('span',{text:' '+lbl})); return l; }
    optRow.appendChild(mkCb('Show residuals',slot.showRes,   v=>slot.showRes=v));
    optRow.appendChild(mkCb('Color by time', slot.colorByTime,v=>slot.colorByTime=v));
    optRow.appendChild(mkCb('Dates',         slot.showAsDate, v=>slot.showAsDate=v));
    optRow.appendChild(mkCb('Show clipped',  slot.showClipped,v=>slot.showClipped=v));
    const clipSel=makeEl('select',{id:`clippedStyle_${sid}`,style:{fontSize:'12px',padding:'2px 4px'}});
    clipSel.innerHTML=`<option value="x">✕ cross</option><option value="circle-open">○ open</option><option value="circle-x-open">⊗ circle-x</option><option value="diamond-open">◇ diamond</option>`;
    clipSel.value=slot.clippedStyle;
    clipSel.addEventListener('change',()=>{ slot.clippedStyle=clipSel.value; updatePlotSlot(sid); });
    optRow.appendChild(clipSel);
    body.appendChild(optRow);
    body.appendChild(makeEl('div',{class:'plot-rv',id:`plotRV_${sid}`}));
    body.appendChild(makeEl('div',{class:'plot-divider',id:`resDivider_${sid}`,style:{display:slot.showRes?'':'none'}}));
    body.appendChild(makeEl('div',{class:'plot-res',id:`plotRes_${sid}`,style:{display:slot.showRes?'':'none'}}));
}

function _buildGLSBody(slot,body){
    const sid=slot.sid;
    const optRow=makeEl('div',{class:'gls-slot-options'});
    function numOpt(lbl,key,min,step){
        optRow.appendChild(makeEl('label',{html:lbl,style:{fontSize:'13px',color:'var(--text2)'}}));
        const inp=makeEl('input',{type:'number',value:String(slot[key]),min:String(min),step:String(step)});
        inp.addEventListener('change',()=>{ slot[key]=parseFloat(inp.value)||slot[key]; updateGLSSlot(sid); });
        optRow.appendChild(inp); return inp;
    }
    numOpt('<em>P</em><sub>min</sub>','pMin',0.01,0.1);
    numOpt('<em>P</em><sub>max</sub>','pMax',1,10);
    numOpt('ofac','ofac',1,1);
    // show period markers checkbox
    const spLbl=makeEl('label',{class:'check-item'});
    const spCb=makeEl('input',{type:'checkbox'}); spCb.checked=slot.showPeriod;
    spCb.addEventListener('change',()=>{ slot.showPeriod=spCb.checked; buildGLSOverlay(sid); });
    spLbl.appendChild(spCb); spLbl.appendChild(makeEl('span',{text:' Mark fit periods'}));
    optRow.appendChild(spLbl);
    // ext GLS
    const extLbl=makeEl('label',{class:'check-item'});
    const extCb=makeEl('input',{type:'checkbox'}); extCb.checked=slot.useExt;
    extCb.addEventListener('change',()=>{ slot.useExt=extCb.checked; if(extCb.checked) loadExtGLS(sid); });
    extLbl.appendChild(extCb); extLbl.appendChild(makeEl('span',{text:' mzechmeister/gls.js'}));
    optRow.appendChild(extLbl);
    // x-axis
    optRow.appendChild(makeEl('label',{text:'x-axis',style:{fontSize:'13px',color:'var(--text2)'}}));
    const xSel=makeEl('select',{style:{fontSize:'12px',padding:'2px 4px'}});
    xSel.innerHTML=`<option value="logperiod">log Period [d]</option><option value="period">Period [d]</option><option value="freq">Frequency [d⁻¹]</option>`;
    xSel.value=slot.xAxis;
    xSel.addEventListener('change',()=>{ slot.xAxis=xSel.value; updateGLSSlot(sid); });
    optRow.appendChild(xSel);
    // compute button
    const computeBtn=makeEl('button',{class:'btn-gls-run',text:'▶ Compute GLS'});
    computeBtn.addEventListener('click',()=>updateGLSSlot(sid));
    optRow.appendChild(computeBtn);
    body.appendChild(optRow);
    // subtract row
    body.appendChild(makeEl('div',{class:'gls-subtract-row',id:`glsSubRow_${sid}`}));
    // plot
    const wrap=makeEl('div',{class:'gls-plot-wrapper'});
    wrap.appendChild(makeEl('div',{class:'',id:`plotGLS_${sid}`,style:{width:'100%',height:'280px'}}));
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.id=`glsOverlay_${sid}`; svg.setAttribute('style','position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;');
    wrap.appendChild(svg); body.appendChild(wrap);
    body.appendChild(makeEl('div',{class:'gls-peak-info',id:`glsPeakInfo_${sid}`}));
}

function loadExtGLS(sid){
    if(window.GLS){ showMsg('gls.js already loaded.',true); return; }
    showMsg('Loading mzechmeister/gls.js…',true);
    const s=document.createElement('script');
    s.src='https://raw.githack.com/mzechmeister/GLS/master/javascript/gls.js';
    s.onload=()=>showMsg('✅ mzechmeister/gls.js loaded.',true);
    s.onerror=()=>{ showMsg('❌ Failed to load gls.js',false); };
    document.head.appendChild(s);
}

function removePanel(sid){
    panels=panels.filter(p=>p.sid!==sid);
    el(`panelSlot_${sid}`)?.remove();
    delete glsLineStates[sid];
    delete glsDragStates[sid];
}

function swapPanels(sidA,sidB){
    const domA=el(`panelSlot_${sidA}`),domB=el(`panelSlot_${sidB}`);
    const container=el('panelSlotsContainer');
    const nodes=[...container.children];
    const iA=nodes.indexOf(domA),iB=nodes.indexOf(domB);
    if(iA<iB){ container.insertBefore(domA,domB.nextSibling); container.insertBefore(domB,nodes[iA]); }
    else      { container.insertBefore(domB,domA.nextSibling); container.insertBefore(domA,nodes[iB]); }
    const si=panels.findIndex(p=>p.sid===sidA),sj=panels.findIndex(p=>p.sid===sidB);
    [panels[si],panels[sj]]=[panels[sj],panels[si]];
}

function togglePanelSlot(sid){
    const body=el(`slotBody_${sid}`),arrow=el(`slotArrow_${sid}`);
    const open=!body.classList.contains('hidden');
    body.classList.toggle('hidden',open); arrow.classList.toggle('open',!open); arrow.classList.toggle('closed',open);
    if(!open){
        const slot=panels.find(p=>p.sid===sid);
        setTimeout(()=>{
            if(slot?.type==='plot'){ Plotly.Plots.resize(`plotRV_${sid}`); if(slot.showRes) Plotly.Plots.resize(`plotRes_${sid}`); }
            else if(slot?.type==='gls'){ Plotly.Plots.resize(`plotGLS_${sid}`); buildGLSOverlay(sid); }
        },50);
    }
}

// ── Update plot slot ──────────────────────────────────────────────────────────
function updatePlotSlot(sid){
    const slot=panels.find(p=>p.sid===sid&&p.type==='plot'); if(!slot) return;
    const p=getFullParamVector();
    const foldPlIdx=slot.foldPid!==null?planetIndex(slot.foldPid):-1;
    const P=foldPlIdx>=0?p[foldPlIdx*5]:0;
    const{trRV,trRes}=buildTraces(p,slot.foldPid,P,slot);
    const dd=buildDatasetsData();
    if(dd.length) displayFitStats(p,dd);
    updateDerived();
    const{axBase,base,C}=makePlotBase();
    const xLbl=xAxisLabel(slot);
    const xAxisDate=slot.showAsDate&&!slot.foldPid;
    const xAxisType=xAxisDate?'date':'linear';
    const xAxExtra=xAxisDate?{}:{tickformat:'~r'};
    const ML=75,MR=20;
    const divider=el(`resDivider_${sid}`),resDiv=el(`plotRes_${sid}`);
    if(divider) divider.style.display=slot.showRes?'':'none';
    if(resDiv)  resDiv.style.display =slot.showRes?'':'none';
    Plotly.react(`plotRV_${sid}`,trRV,{...base,margin:{l:ML,r:MR,t:15,b:slot.showRes?5:50},
        xaxis:slot.showRes?{...axBase,...xAxExtra,title:'',showticklabels:false,type:xAxisType}:{...axBase,...xAxExtra,title:xLbl,type:xAxisType},
        yaxis:{...axBase,tickformat:'~r',title:`RV [${getKUnit()}]`},
        legend:{x:.01,y:.99,xanchor:'left',yanchor:'top',bgcolor:C.legendBg,bordercolor:C.grid,borderwidth:1}},
        {responsive:true,displayModeBar:'hover'});
    if(slot.showRes){
        Plotly.react(`plotRes_${sid}`,trRes,{...base,margin:{l:ML,r:MR,t:5,b:50},
            xaxis:{...axBase,...xAxExtra,title:xLbl,type:xAxisType},
            yaxis:{...axBase,tickformat:'~r',title:`Residuals [${getKUnit()}]`,zeroline:true,zerolinewidth:1},
            showlegend:false},{responsive:true,displayModeBar:'hover'});
    }
    saveToSession();
}

// ── Update GLS slot ───────────────────────────────────────────────────────────
function updateGLSSlot(sid){
    const slot=panels.find(p=>p.sid===sid&&p.type==='gls'); if(!slot) return;
    const dd=buildDatasetsData(),p=getFullParamVector();
    const{axBase,base,C}=makePlotBase();
    const xFreq=slot.xAxis==='freq';
    const xTitle=xFreq?'Frequency [d⁻¹]':'Period <i>P</i> [days]';
    const xAxisType=slot.xAxis==='logperiod'?'log':'linear';
    const plotDiv=el(`plotGLS_${sid}`);
    if(!dd.length||dd.reduce((s,d)=>s+d.ts.length,0)<4){
        Plotly.react(plotDiv,[],{...base,margin:{l:65,r:20,t:15,b:50},xaxis:{...axBase,tickformat:'~r',title:xTitle,type:xAxisType},yaxis:{...axBase,tickformat:'~r',title:'GLS Power'}},{responsive:true,displayModeBar:'hover'});
        el(`glsPeakInfo_${sid}`).textContent='No data.';
        _registerGLSListeners(sid); return;
    }
    const pMin=slot.pMin||1,pMax=slot.pMax||1000,ofac=slot.ofac||10;
    const allTs=[],allRVs=[],allErrs=[];
    dd.forEach(({ts,rvs,errs,dsIdx})=>{
        const g=p[gammaOffset()+dsIdx]||0;
        ts.forEach((t,i)=>{
            let rv=rvs[i]-g;
            planets.forEach((pl,pi)=>{
                if(pl.active===false) return;
                const sub=slot.glsSubtract?.[pl.pid];
                if(sub===false) return;
                rv-=keplerianRV(t,p[pi*5],p[pi*5+1],p[pi*5+2],p[pi*5+3],p[pi*5+4]);
            });
            allTs.push(t); allRVs.push(rv); allErrs.push(errs[i]);
        });
    });
    const fMin=1/pMax,fMax=1/pMin;
    let periods,power,freqs;
    const useExt=slot.useExt&&typeof GLS==='function';
    if(slot.useExt&&!useExt) showMsg('⏳ mzechmeister/gls.js not yet loaded.',true);
    if(useExt){
        try{ const r=GLS(allTs,allRVs,{e_y:allErrs,fbeg:fMin,fend:fMax,ofac}); freqs=Array.from(r.f); periods=freqs.map(f=>1/f); power=Array.from(r.p); }
        catch(err){ showMsg(`❌ GLS error: ${err.message}`,false); return; }
    } else {
        const T=dd.reduce((mx,d)=>{ const sp=Math.max(...d.ts)-Math.min(...d.ts); return sp>mx?sp:mx; },0)||(1/fMin);
        const nFreq=Math.max(Math.round(ofac*T*(fMax-fMin)),100);
        freqs=Array.from({length:nFreq},(_,i)=>fMin+(fMax-fMin)*i/(nFreq-1));
        periods=freqs.map(f=>1/f);
        power=Array.from(computeGLS_builtin(allTs,allRVs,allErrs,freqs));
    }
    let peakIdx=0,peakPow=0;
    for(let i=0;i<power.length;i++) if(power[i]>peakPow){ peakPow=power[i]; peakIdx=i; }
    const peakPeriod=periods[peakIdx],peakFreq=freqs[peakIdx],peakX=xFreq?peakFreq:peakPeriod;
    const xData=xFreq?freqs:periods,xL=xFreq?fMax:pMin,xR=xFreq?fMin:pMax;
    const pkCol=peakMarkerColor();
    const peakLabel=xFreq?`Peak  <i>f</i> = ${peakFreq.toFixed(5)} d⁻¹`:`Peak  <i>P</i> = ${peakPeriod.toFixed(4)} d`;
    const fapLevels=[0.1,0.01,0.001],fapColors=['#ffbe0b','#f72585','#a0ff78'];
    const traces=[{x:xData,y:power,mode:'lines',type:'scatter',name:useExt?'GLS (mzechmeister)':'GLS Power',line:{color:'#4cc9f0',width:1.5}}];
    fapLevels.forEach((fap,i)=>{ const pw=1-Math.pow(1-fap,1/power.length); traces.push({x:[xL,xR],y:[pw,pw],mode:'lines',type:'scatter',name:`FAP ${(fap*100).toFixed(1)}%`,line:{color:fapColors[i],width:1,dash:'dot'}}); });
    traces.push({x:[peakX],y:[peakPow],mode:'markers',type:'scatter',name:peakLabel,marker:{symbol:'circle-open',size:16,color:pkCol,line:{color:pkCol,width:2.5}},hovertemplate:xFreq?`<i>f</i> = %{x:.6f} d⁻¹<br>power = %{y:.4f}<extra>Peak</extra>`:`<i>P</i> = %{x:.5f} d<br>power = %{y:.4f}<extra>Peak</extra>`});
    Plotly.react(plotDiv,traces,{...base,margin:{l:65,r:20,t:15,b:50},
        xaxis:{...axBase,tickformat:'~r',title:xTitle,type:xAxisType},
        yaxis:{...axBase,tickformat:'~r',title:'GLS Power',range:[0,Math.min(1,peakPow*1.2)]},
        legend:{x:.99,y:.99,xanchor:'right',yanchor:'top',bgcolor:C.legendBg,bordercolor:C.grid,borderwidth:1}},
        {responsive:true,displayModeBar:'hover'});

function _registerGLSListeners(sid){
    const slot=panels.find(p=>p.sid===sid&&p.type==='gls'); if(!slot) return;
    if(slot._afterplotBound) return;
    const plotDiv=el(`plotGLS_${sid}`); if(!plotDiv) return;

    plotDiv.on('plotly_relayout',()=>buildGLSOverlay(sid));
    plotDiv.on('plotly_click',data=>{
        const pt=data.points[0]; if(pt.curveNumber!==0) return;
        const period=slot.xAxis==='freq'?1/pt.x:pt.x;
        const handled=_glsHandleCurveClick(sid,period);
        if(!handled) el(`glsPeakInfo_${sid}`).textContent=`Selected: P = ${period.toFixed(5)} d  (power = ${pt.y.toFixed(4)})  — click a period line first to assign`;
    });

}

function addPlanet(opts={}){
    const pid=nextPlanetId++,i=planets.length,col=planetColor(i),KU=getKUnit();
    const bjd0=getGlobalBJD0();
    const allTs=datasets.flatMap(ds=>(ds.rawRows||[]).map(r=>r.t+getDsT0Ref(ds)-bjd0));
    const tMean=allTs.length?mean(allTs):0,tSpan=allTs.length>=2?Math.max(...allTs)-Math.min(...allTs):10;
    const pl={pid,name:opts.name??defaultPlanetName(i),P:opts.P??Math.max(tSpan/2,1),
        K_ms:opts.K_ms??toMs(opts.K??50,KU),e:opts.e??0,omega_deg:opts.omega_deg??0,t0:opts.t0??tMean,
        fitP:opts.fitP??true,fitK:opts.fitK??true,fitE:opts.fitE??true,
        fitOmega:opts.fitOmega??true,fitT0:opts.fitT0??true,
        active:opts.active??true,glsSubtract:opts.glsSubtract??true};
    planets.push(pl);

    rebuildGLSSubtractRows(); rebuildFoldSelects();

// ── Preview ───────────────────────────────────────────────────────────────────
function setDsView(id,view){
    const cm=el(`cmWrap_${id}`),pv=el(`preview_${id}`),btnRaw=el(`btnRaw_${id}`),btnPrev=el(`btnPrev_${id}`);
    if(view==='raw'){ cm.style.display='block'; pv.style.display='none'; btnRaw.classList.add('active'); btnPrev.classList.remove('active'); dsById(id)?.editor.refresh(); }
    else{ cm.style.display='none'; pv.style.display='block'; btnRaw.classList.remove('active'); btnPrev.classList.add('active'); buildDsPreview(id); }
}
function splitAtDecimal(s){ const d=s.indexOf('.'); return d<0?{int:s,dec:''}:{int:s.slice(0,d),dec:s.slice(d)}; }

function buildDsPreview(id){
    const ds=dsById(id); if(!ds) return;
    const pv=el(`preview_${id}`); pv.innerHTML='';
    const clipOn=getChecked(`clipEnabled_${id}`,false),clipped=getClippedSet(id);
    const KU=getKUnit(),dsUnit=getDsUnit(ds),t0ref=getDsT0Ref(ds),bjd0=getGlobalBJD0();
    const parsed=[]; let dataIdx=0;
    ds.editor.getValue().split('\n').forEach((line,lineIdx)=>{
        const l=line.trim(),isComment=!l||l.startsWith('#');
        if(isComment){ parsed.push({lineIdx,line,isComment:true}); return; }
        const parts=l.split(/[\s,;]+/),tRaw=parseFloat(parts[0]||'');
        const tAdj=isFinite(tRaw)?tRaw+t0ref-bjd0:NaN;
        parsed.push({lineIdx,line,isComment:false,dataIdx:dataIdx++,tRaw:parts[0]||'',tAdj,rv:parts[1]||'',err:parts[2]||'',iso:isFinite(tRaw)?jdToIso(tRaw+t0ref):'—'});
    });
    const dataRows=parsed.filter(r=>!r.isComment);
    const tStrs=dataRows.map(r=>isFinite(r.tAdj)?r.tAdj.toFixed(6):(r.tRaw||'—'));
    const tSplits=tStrs.map(s=>splitAtDecimal(s));
    const wTInt=Math.max(1,...tSplits.map(s=>s.int.length));
    const wTDec=Math.max(0,...tSplits.map(s=>s.dec.length));
    const rvErrPairs=dataRows.map(r=>{
        const rvNum=parseFloat(r.rv),errNum=parseFloat(r.err);
        const rvMs=isNaN(rvNum)?null:toMs(rvNum,dsUnit);
        const errMs=(!isNaN(errNum)&&errNum>0)?toMs(errNum,dsUnit):null;
        const rvDisp=rvMs!==null?fromMs(rvMs,KU):null;
        const errDisp=errMs!==null?fromMs(errMs,KU):null;
        const{rvStr,errStr}=fmtRVPair(rvDisp??NaN,errDisp??NaN);

    });

            row.appendChild(cb);

            const tStr=isFinite(tAdj)?tAdj.toFixed(6):'—';
            row.appendChild(mkNum(iso,wISO,'var(--accent2)'));
            row.appendChild(mkTimeCell(tStr));

// ── Clip table ────────────────────────────────────────────────────────────────

    for(const line of ds.editor.getValue().trim().split('\n')){
        ln++; const l=line.trim(); if(!l||l.startsWith('#')) continue;
        const parts=l.split(/[\s,;]+/); if(parts.length<2) continue;
        const t=parseFloat(parts[0]),rv=parseFloat(parts[1]),er=parts.length>=3?parseFloat(parts[2]):NaN;
        if(!isNaN(t)&&!isNaN(rv)) ds.rawRows.push({t,rv,er:(!isNaN(er)&&er>=0)?er:NaN,lineNum:ln});
    }
    const tbody=el(`clipTbody_${id}`); tbody.innerHTML='';
    ds.rawRows.forEach((_,i)=>{ const tr=makeEl('tr',{id:`clipRow_${id}_${i}`}); const cb=makeEl('input',{type:'checkbox',id:`clip_${id}_${i}`}); cb.addEventListener('change',()=>onClipToggle(id,i)); tr.appendChild(makeEl('td',{},[cb])); tbody.appendChild(tr); });
    updateStatsBar(id); updateAllPanels();

function onClipToggle(id,i){ el(`clipRow_${id}_${i}`)?.classList.toggle('clipped',getChecked(`clip_${id}_${i}`,false)); updateAllPanels(); }
function getClippedSet(id){ const s=new Set(); dsById(id)?.rawRows.forEach((_,i)=>{ if(getChecked(`clip_${id}_${i}`,false)) s.add(i); }); return s; }

// ── Parse dataset ─────────────────────────────────────────────────────────────
function parseDatasetRaw(id){
    const ds=dsById(id); if(!ds||!ds.rawRows.length) return null;
    const clippedSet=getChecked(`clipEnabled_${id}`,false)?getClippedSet(id):new Set();
    const ts=[],rvs=[],errs=[],lineNums=[],ts_c=[],rvs_c=[],errs_c=[],lineNums_c=[];
    ds.rawRows.forEach((row,i)=>{
        const er=(!isNaN(row.er)&&row.er>=0)?row.er:0;
        if(clippedSet.has(i)){ ts_c.push(row.t); rvs_c.push(row.rv); errs_c.push(er); lineNums_c.push(row.lineNum); }
        else{ ts.push(row.t); rvs.push(row.rv); errs.push(er); lineNums.push(row.lineNum); }
    });
    if(!ts.length&&!ts_c.length) return null;
    return{ts,rvs,errs,lineNums,clipped:{ts:ts_c,rvs:rvs_c,errs:errs_c,lineNums:lineNums_c}};
}
function parseDatasetMs(id){
    const raw=parseDatasetRaw(id); if(!raw) return null;
    const ds=dsById(id),t0ref=getDsT0Ref(ds),bjd0=getGlobalBJD0(),unit=getDsUnit(ds);
    const adjT=arr=>arr.map(t=>t+t0ref-bjd0),convV=arr=>arr.map(v=>toMs(v,unit)),convE=arr=>arr.map(e=>toMs(e,unit));
    return{ts:adjT(raw.ts),rvs:convV(raw.rvs),errs:convE(raw.errs),lineNums:raw.lineNums,
        clipped:{ts:adjT(raw.clipped.ts),rvs:convV(raw.clipped.rvs),errs:convE(raw.clipped.errs),lineNums:raw.clipped.lineNums}};
}
function buildDatasetsData(){ return datasets.flatMap((ds,idx)=>{ const d=parseDatasetMs(ds.id); return d&&(d.ts.length||d.clipped.ts.length)?[{...d,dsIdx:idx,dsId:ds.id}]:[]; }); }

// ── RV model ──────────────────────────────────────────────────────────────────
function solveKepler(M,e,tol=1e-9){ let E=M; for(let i=0;i<100;i++){ const dE=(M-E+e*Math.sin(E))/(1-e*Math.cos(E)); E+=dE; if(Math.abs(dE)<tol) break; } return E; }
function keplerianRV(t,P,K,e,omega,t0){
    if(K===0||P<=0) return 0;
    const M=((2*Math.PI*(t-t0)/P)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
    const E=solveKepler(M,e);
    const nu=2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2));
    return K*(Math.cos(nu+omega)+e*Math.cos(omega));
}
function rvModelP(t,p,dsIdx=0){
    rvModelCallCount++;
    if(rvModelCallCount%1000===0) el('rvModelCallCount').textContent=rvModelCallCount.toLocaleString();
    const nPl=planets.length,gamma=p[gammaOffset()+dsIdx]||0;
    let rv=gamma;
    for(let i=0;i<nPl;i++){ if(planets[i].active===false) continue; rv+=keplerianRV(t,p[i*5],p[i*5+1],p[i*5+2],p[i*5+3],p[i*5+4]); }
    return rv;
}

// ── Param vector layout ───────────────────────────────────────────────────────
function nPlanetParams(){ return planets.length*5; }
function gammaOffset(){ return nPlanetParams(); }

// ── Jitter parametrisation: s = jit²  ─────────────────────────────────────────
//
// negLogLike depends on jit² via sig2 = err² + jit², so
// ∂L/∂jit = 2·jit · ∂L/∂(jit²) — which is identically zero at jit=0.
// LM therefore finds no descent direction and does not iterate away from zero.
//
// Fix: use s = jit² as the internal free parameter (lives in ℝ, no clamping
// needed for the sign). ∂L/∂s = Σ(err²-res²)/(2·sig2²) — informative at s=0.
// s can go negative after an LM step; clampFull enforces s ≥ 0.
//
// Perturbation: if s=0 and fitJitter is active, seed s = scale(s)² so the
// first gradient step starts away from the boundary.
//
// Future: negative s could encode correlated noise terms, or s=jit² could be
// replaced by a richer covariance structure.
//
// Error estimate: σ(jit) = σ(s) / (2·jit)  via error propagation.
//                 If jit≈0 after fit: jitter not significantly detected.

function getFreeFlags(){

const compressParams=(full,flags)=>full.filter((_,j)=>flags[j]);

function rvStdFromData(dd){ const all=dd.flatMap(d=>d.rvs); return all.length?std(all)||10:10; }
function paramScales(p,dd,rvStd){
    let tspan=0; dd.forEach(d=>{ const sp=Math.max(...d.ts)-Math.min(...d.ts); if(sp>tspan) tspan=sp; });

// ── Solvers ───────────────────────────────────────────────────────────────────

function nelderMead(initFull,dd,maxIter=30000){

// ── Error estimation ──────────────────────────────────────────────────────────
function estimateErrors(bestFull,dd){
    const flags=getFreeFlags(),nFull=bestFull.length;

    for(let j=0;j<nFull;j++) if(flags[j]) sigmasFull[j]=sigmasFree[fi++];

    // sigmasFull[jitterOffset+idx] is σ(s); convert to σ(jit) for display
    const jStart=jitterOffset();
    datasets.forEach((_,idx)=>{
        const s=Math.max(0,bestFull[jStart+idx]||0);
        const jit=Math.sqrt(s);
        const sigS=sigmasFull[jStart+idx];
        sigmasFull[jStart+idx]= jit>1e-10 ? sigS/(2*jit) : 0;
    });

function invertMatrix(A){

        let maxRow=col,maxVal=Math.abs(M[col][col]);
        for(let row=col+1;row<n;row++) if(Math.abs(M[row][col])>maxVal){ maxVal=Math.abs(M[row][col]); maxRow=row; }
        [M[col],M[maxRow]]=[M[maxRow],M[col]];
        if(Math.abs(M[col][col])<1e-14) return null;
        const sc=M[col][col]; for(let k=0;k<2*n;k++) M[col][k]/=sc;
        for(let row=0;row<n;row++){ if(row===col) continue; const fac=M[row][col]; for(let k=0;k<2*n;k++) M[row][k]-=fac*M[col][k]; }

// ── Fit stats ─────────────────────────────────────────────────────────────────

        else{ const pOrbit=[...p]; pOrbit[gammaOffset()]=gamRef; trRV.push({x:xCplot,y:xC.map(x=>fromMs(rvModelP(x,pOrbit,0),plotUnit)),mode:'lines',type:'scatter',name:'Orbit',line:{color:'#f72585',width:2}}); if(activePlanets.length>1){ activePlanets.forEach(pl=>{ const i=planetIndex(pl.pid),col=planetColor(i); const y=xC.map(x=>fromMs(keplerianRV(x,p[i*5],p[i*5+1],p[i*5+2],p[i*5+3],p[i*5+4]),plotUnit)); trRV.push({x:xCplot,y,mode:'lines',type:'scatter',name:pl.name,visible:'legendonly',line:{color:col,width:1.5,dash:'dot'}}); }); } }

// ── GLS builtin ───────────────────────────────────────────────────────────────
function computeGLS_builtin(ts,rvs,errs,freqs){
    const n=ts.length,w0=errs.map(e=>e>0?1/(e*e):1),W=w0.reduce((a,b)=>a+b,0);
    const wi=w0.map(w=>w/W),ybar=mean(rvs),power=new Float64Array(freqs.length);
    for(let fi=0;fi<freqs.length;fi++){
        const omega=2*Math.PI*freqs[fi]; let C_=0,S_=0,YY=0;
        for(let i=0;i<n;i++){ C_+=wi[i]*Math.cos(omega*ts[i]); S_+=wi[i]*Math.sin(omega*ts[i]); YY+=wi[i]*(rvs[i]-ybar)**2; }
        let CC2=0,SS2=0,CS2=0,YC2=0,YS2=0;
        for(let i=0;i<n;i++){ const c=Math.cos(omega*ts[i])-C_,s=Math.sin(omega*ts[i])-S_,y=rvs[i]-ybar; CC2+=wi[i]*c*c; SS2+=wi[i]*s*s; CS2+=wi[i]*c*s; YC2+=wi[i]*y*c; YS2+=wi[i]*y*s; }
        const D=CC2*SS2-CS2*CS2; if(Math.abs(D)<1e-30||Math.abs(YY)<1e-30){ power[fi]=0; continue; }
        power[fi]=(SS2*YC2*YC2+CC2*YS2*YS2-2*CS2*YC2*YS2)/(D*YY);
    }
    return power;
}

// ── Fit ───────────────────────────────────────────────────────────────────────
function doFit(){
    const dd=buildDatasetsData(),nFree=getFreeFlags().filter(Boolean).length;
    if(!dd.length||dd.reduce((s,d)=>s+d.ts.length,0)<=nFree){ showMsg('Not enough data.',false); return; }
    const algo=el('fitAlgo').value;
    const algoNames={'lm':'Levenberg-Marquardt','nelder-mead':'Nelder-Mead','diff-evol':'Differential Evolution'};
    saveUndoSnapshot(); resetCallCount(); clearErrors();
    const nAct=planets.filter(pl=>pl.active!==false).length,nPlStr=nAct===0?'null model':`${nAct} planet(s)`;
    showMsg(`Fitting [${nPlStr}] with ${algoNames[algo]}…`,true);
    setFitBtnsDisabled(true);
    // get initial param vector — will be modified before fitting
    let initP=getFullParamVector();
    // Perturbation for jitter: if s=0 and fitJitter active, seed s = scale(s)
    // so the first gradient step starts away from the boundary.
    const rvStd=rvStdFromData(dd);
    const scaleS=Math.max(rvStd**2*.01,1e-4);
    datasets.forEach((ds,idx)=>{
        if(getChecked(`fitJitter_${ds.id}`,false)){
            const s=initP[jitterOffset()+idx];
            if(s<1e-20) initP[jitterOffset()+idx]=scaleS;
        }
    });
    setTimeout(()=>{
        try{
            const fitted=runFit(initP,dd,algo);
            setFullParamVector(fitted);
            const errResult=estimateErrors(fitted,dd);
            if(errResult){ _lastSigmasFull=errResult.sigmasFull; displayErrors(errResult.sigmasFull); }
            updateAllPanels(); panels.filter(p=>p.type==='gls').forEach(p=>buildGLSOverlay(p.sid));
            const{rms,wrms,chi2,chi2red}=displayFitStats(fitted,dd);
            const KU=getKUnit();
            el('rvModelCallCount').textContent=rvModelCallCount.toLocaleString();
            showMsg(`✅ [${algoNames[algo]}, ${nPlStr}]  RMS=${fmtSig3(fromMs(rms,KU))} ${KU}  wRMS=${fmtSig3(fromMs(wrms,KU))} ${KU}  χ²=${chi2.toFixed(1)}  χ²_red=${chi2red.toFixed(3)}`,true);
        }catch(err){ showMsg('❌ Fit failed: '+err.message,false); }
        finally{ setFitBtnsDisabled(false); }
    },50);
}

    showMsg('Loading…',true);
    const proxies=[u=>u,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://cors-anywhere.herokuapp.com/${u}`];
    let text=null,lastErr='';
    for(const mk of proxies){ try{ const r=await fetch(mk(url)); if(r.ok){text=await r.text();break;} else lastErr=`HTTP ${r.status}`; }catch(e){ lastErr=e.message; } }
    if(text!==null){ dsById(id).editor.setValue(text); rebuildClipTable(id); if(id===datasets[0]?.id) propagateUnitFromDs0(); showMsg('✅ Loaded from URL.',true); }
    else showMsg(`❌ Failed: ${lastErr}`,false);
}
function loadSample(id){
    const off=2450000,params_ms=[7.3,80,.3,45*Math.PI/180,off+1.2,10];
    const idx=dsIndex(id),gammaMs=idx*20000,ds=datasets[idx],dsUnit=getDsUnit(ds);
    const times=[0.3,1.1,2.0,2.9,3.5,4.2,5.0,5.8,6.7,7.5,8.3,9.1,10.0,11.2,12.0,13.1,14.3,15.0,16.2,17.5].map(t=>t+off+idx*18);
    let txt=`# time [JD]      RV [${dsUnit}]   error [${dsUnit}]\n`;
    times.forEach(t=>{ const rv_ms=rvModelP(t-off,params_ms,0)+gammaMs+(Math.random()-.5)*8,err_ms=2+Math.random()*4; txt+=`${t.toFixed(2)}   ${fromMs(rv_ms,dsUnit).toFixed(4)}   ${fromMs(err_ms,dsUnit).toFixed(4)}\n`; });
    if(idx===0&&planets.length>0){ const KU=getKUnit(),pid=planets[0].pid; setNumVal(`pP_${pid}`,7.5,2); setNumVal(`pK_${pid}`,fromMs(80,KU),4); setNumVal(`pE_${pid}`,0.2,2); setNumVal(`pOmega_${pid}`,30,2); setNumVal(`pT0_${pid}`,1.0,2); planets[0].P=7.5; planets[0].K_ms=80; if(_planetView==='table') syncDOMToTable(pid); }
    setNumVal(`t0ref_${ds.id}`,-off,0); setNumVal(`pGamma_${ds.id}`,fromMs(gammaMs,getKUnit()),4);
    dsById(id).editor.setValue(txt); rebuildClipTable(id); if(idx===0) propagateUnitFromDs0();
    showMsg(`Sample loaded into ${ds.name} — click Fit!`,true);
}
function clearDataset(id){ dsById(id).editor.setValue(''); dsById(id).rawRows=[]; el(`clipTbody_${id}`).innerHTML=''; el(`statsBar_${id}`).style.display='none'; updateAllPanels(); }
function showMsg(msg,ok){ const e=el('statusMsg'); e.textContent=msg; e.className=ok?'msg-ok':'msg-err'; }

// ── Sidebar ───────────────────────────────────────────────────────────────────
function toggleSidebar(forceOn){
    const on=forceOn!==undefined?forceOn:!document.body.classList.contains('sidebar-mode');
    updateScrollbarWidth();
    if(on){ document.body.appendChild(el('paramPanel')); document.body.classList.add('sidebar-mode'); }
    else{ el('topRow').appendChild(el('paramPanel')); document.body.classList.remove('sidebar-mode'); }
    el('btnSidebar').textContent=on?'⊲ Normal':'⊳ Sidebar';
    el('btnSidebar').classList.toggle('active',on);
    setTimeout(()=>resizeAllPlots(),300);
}

// ── Static event wiring ───────────────────────────────────────────────────────
function initStaticEvents(){
    el('btnNew').addEventListener('click',newProject);
    el('btnSave').addEventListener('click',()=>saveProject(false));
    el('btnSaveAs').addEventListener('click',()=>saveProject(true));
    el('btnOpen').addEventListener('click',()=>el('projectFileInput').click());
    el('projectFileInput').addEventListener('change',loadProject);
    el('btnTheme').addEventListener('click',toggleTheme);
    el('btnFit').addEventListener('click',doFit);
    el('btnFitTop').addEventListener('click',doFit);
    el('btnAutoGuess').addEventListener('click',autoGuess);
    el('undoBtn').addEventListener('click',undoFit);
    el('gammaRefSrc').addEventListener('change',onGammaRefSrcChange);
    el('gammaRefVal').addEventListener('change',updateAllPanels);
    el('globalUnit').addEventListener('change',()=>{ rebuildGammaUI(); updateAllPanels(); if(_planetView==='table') buildPlanetTable(); });
    el('globalBJD0').addEventListener('change',()=>{ updateAllPanels(); updateT0Labels(); if(_planetView==='table') buildPlanetTable(); });
    el('globalBJD0').addEventListener('keydown',e=>{ if(e.key==='Enter'){ updateAllPanels(); updateT0Labels(); } });
    el('starMass').addEventListener('change',updateDerived);
    el('starMass').addEventListener('keydown',e=>{ if(e.key==='Enter') updateDerived(); });
    el('starMassSig').addEventListener('change',updateDerived);
    el('msiniUnit').addEventListener('change',updateDerived);
    el('dataHeader').addEventListener('click',()=>togglePanel('dataBody','dataArrow'));
    el('paramHeader').addEventListener('click',()=>togglePanel('paramBody','paramArrow'));
    el('projectName').addEventListener('change',updateWindowTitle);
    el('projectName').addEventListener('input',updateWindowTitle);
    el('btnSidebar').addEventListener('click',()=>toggleSidebar());
    el('btnSidebarClose').addEventListener('click',()=>toggleSidebar(false));
    el('btnPlanetViewTab').addEventListener('click',()=>setPlanetView('tabs'));
    el('btnPlanetViewTable').addEventListener('click',()=>setPlanetView('table'));
    el('btnAddPlot').addEventListener('click',()=>addPanel('plot'));
    el('btnAddGLS').addEventListener('click',()=>addPanel('gls'));
    window.addEventListener('resize',updateScrollbarWidth);
    initSidebarResize();
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload=()=>{
    updateScrollbarWidth();
    initStaticEvents();
    el('topRow').appendChild(el('paramPanel'));
    const restored=restoreFromSession();
    if(!restored){
        addPlanet(); addDataset();
        addPanel('plot'); addPanel('gls');
    }
    setPlanetView(_planetView);
    updateDerived(); updateWindowTitle();
    setTimeout(()=>{
        if(typeof plotlyEnableZoomPan==='function'){
            panels.forEach(p=>{
                try{ if(p.type==='plot'){ plotlyEnableZoomPan(el(`plotRV_${p.sid}`)); if(p.showRes) plotlyEnableZoomPan(el(`plotRes_${p.sid}`)); } else plotlyEnableZoomPan(el(`plotGLS_${p.sid}`)); }catch(e){}
            });
        }
    },400);
};
</script>
